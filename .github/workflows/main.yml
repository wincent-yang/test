name: Python CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements file, skip"

      - name: Run Python script
        run: python chap2/demo1.py

  # 新增：通知 Job，依赖 build，构建完必定执行
  notify:
    runs-on: ubuntu-latest
    needs: build  # 等待 build 任务完成再运行
    if: always()  # 关键：不管 build 成功/失败，都执行通知
    steps:
      - name: 输出运行结果通知
        run: |
          echo "✅ Python CI 任务已执行完毕"
          echo "任务状态: ${{ job.status }}"
