# .github/workflows/main.yml
name: Python CI

# 触发条件：推送到 master 分支、提交 PR 时运行
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# 运行任务
jobs:
  build:
    # 运行环境：Windows / Ubuntu / macOS 任选，这里用主流 Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # 和你本地版本保持一致

      # 步骤3：安装依赖（如果有 requirements.txt 就启用）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "无依赖文件，跳过"

      # 步骤4：运行你的 Python 代码（示例：执行指定脚本）
      - name: Run Python script
        run: python 草稿.py
